  <line x1="1325" y1="117" x2="1291" y2="151" stroke="#E55B2B" stroke-width="3"/>
  <text x="1272" y="223" fill="#666666" font-size="11.5" text-anchor="middle">Clock icon, no</text>
  <text x="1272" y="239" fill="#666666" font-size="11.5" text-anchor="middle">timezone conversion.</text>

  <!-- ===================== PANEL 3: COMPLEX TYPES ===================== -->
  <rect x="15" y="378" width="668" height="375" rx="7" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="25" y="387" width="192" height="37" rx="5" fill="#1565C0"/>
  <text x="36" y="411" fill="white" font-size="19" font-weight="bold">Complex Types</text>

  <!-- ARRAY sub-panel -->
  <rect x="25" y="436" width="190" height="205" rx="6" fill="white" stroke="#E55B2B" stroke-width="1.5"/>
  <text x="120" y="458" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">ARRAY</text>
  <line x1="63" y1="472" x2="63" y2="546" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="63" cy="473" r="5" fill="#1565C0"/>
  <rect x="75" y="463" width="70" height="20" rx="10" fill="#1565C0"/>
  <text x="110" y="477" fill="white" font-size="10" text-anchor="middle">tag1</text>
  <circle cx="63" cy="501" r="5" fill="#1565C0"/>
  <rect x="75" y="491" width="70" height="20" rx="10" fill="#1565C0"/>
  <text x="110" y="505" fill="white" font-size="10" text-anchor="middle">tag2</text>
  <circle cx="63" cy="529" r="5" fill="#1565C0"/>
  <rect x="75" y="519" width="70" height="20" rx="10" fill="#1565C0"/>
  <text x="110" y="533" fill="white" font-size="10" text-anchor="middle">tag2</text>
  <text x="120" y="571" fill="#555555" font-size="10" text-anchor="middle">[value1, value2, value3]</text>

  <!-- MAP sub-panel -->
  <rect x="228" y="436" width="190" height="205" rx="6" fill="white" stroke="#E55B2B" stroke-width="1.5"/>
  <text x="323" y="458" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">MAP</text>
  <!-- Key icon: circle with crosshair + diagonal shaft + teeth -->
  <circle cx="277" cy="505" r="16" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="261" y1="505" x2="293" y2="505" stroke="#1565C0" stroke-width="1.8"/>
  <line x1="277" y1="489" x2="277" y2="521" stroke="#1565C0" stroke-width="1.8"/>
  <line x1="289" y1="516" x2="316" y2="536" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="530" x2="314" y2="523" stroke="#1565C0" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="313" y1="534" x2="319" y2="527" stroke="#1565C0" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arrow -->
  <line x1="328" y1="505" x2="342" y2="505" stroke="#555555" stroke-width="1.5"/>
  <polygon points="342,502 348,505 342,508" fill="#555555"/>
  <!-- Chest body -->
  <rect x="352" y="491" width="48" height="33" rx="4" fill="#8B5E20"/>
  <rect x="352" y="491" width="48" height="14" rx="4" fill="#A8742A"/>
  <line x1="352" y1="505" x2="400" y2="505" stroke="#6E4A18" stroke-width="1"/>
  <rect x="352" y="502" width="48" height="4" fill="#7A5018" opacity="0.6"/>
  <rect x="370" y="503" width="12" height="12" rx="2" fill="#D4A820"/>
  <circle cx="376" cy="507" r="3.5" fill="none" stroke="#8B6010" stroke-width="1.5"/>
  <rect x="374" y="510" width="4" height="4" rx="1" fill="#8B6010"/>
  <text x="323" y="558" fill="#555555" font-size="9.5" text-anchor="middle">{key1: value1, key2: value2}</text>

  <!-- STRUCT sub-panel -->
  <rect x="431" y="436" width="237" height="205" rx="6" fill="white" stroke="#E55B2B" stroke-width="1.5"/>
  <text x="549" y="458" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">STRUCT</text>
  <!-- Table: single outer border -->
  <rect x="481" y="467" width="112" height="54" rx="3" fill="white" stroke="#1565C0" stroke-width="2"/>
  <!-- Fields cell (blue) -->
  <rect x="481" y="467" width="40" height="26" rx="2" fill="#1565C0"/>
  <rect x="481" y="480" width="40" height="13" fill="#1565C0"/>
  <text x="501" y="484" fill="white" font-size="9" text-anchor="middle" font-weight="bold">Fields</text>
  <!-- Name cell (orange) -->
  <rect x="523" y="467" width="70" height="26" rx="2" fill="#E55B2B"/>
  <rect x="523" y="480" width="70" height="13" fill="#E55B2B"/>
  <text x="558" y="484" fill="white" font-size="9" text-anchor="middle" font-weight="bold">Name</text>
  <!-- Separator line -->
  <line x1="481" y1="493" x2="593" y2="493" stroke="#CCCCCC" stroke-width="0.8"/>
  <!-- Second row: left blank, right orange -->
  <rect x="481" y="493" width="40" height="28" fill="#F5F5F5"/>
  <rect x="523" y="493" width="70" height="28" fill="#E55B2B"/>
  <text x="558" y="511" fill="white" font-size="9" text-anchor="middle">Address</text>
  <!-- Redraw outer border on top -->
  <rect x="481" y="467" width="112" height="54" rx="3" fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="549" y="549" fill="#555555" font-size="9" text-anchor="middle">{field1: value1,</text>
  <text x="549" y="562" fill="#555555" font-size="9" text-anchor="middle">field2: {subfieldt: value1}}</text>

  <!-- Data flow diagram (centered ~x=323 in panel) -->
  <rect x="243" y="663" width="44" height="22" rx="3" fill="#1565C0"/>
  <text x="265" y="678" fill="white" font-size="9" text-anchor="middle" font-weight="bold">data</text>
  <line x1="287" y1="674" x2="300" y2="674" stroke="#555555" stroke-width="1.5"/>
  <polygon points="300,671 305,674 300,677" fill="#555555"/>
  <!-- Top-right box -->
  <rect x="305" y="658" width="38" height="22" rx="3" fill="#E55B2B"/>
  <!-- Arrow right from top box -->
  <line x1="343" y1="669" x2="356" y2="669" stroke="#555555" stroke-width="1.5"/>
  <polygon points="356,666 361,669 356,672" fill="#555555"/>
  <!-- Top-far-right box -->
  <rect x="361" y="658" width="38" height="22" rx="3" fill="#E55B2B"/>
  <!-- Arrow down from top-right box -->
  <line x1="324" y1="680" x2="324" y2="693" stroke="#555555" stroke-width="1.5"/>
  <polygon points="321,693 324,698 327,693" fill="#555555"/>
  <!-- Bottom-middle box -->
  <rect x="305" y="698" width="38" height="22" rx="3" fill="#E55B2B"/>
  <!-- Arrow right from bottom-middle box -->
  <line x1="343" y1="709" x2="356" y2="709" stroke="#555555" stroke-width="1.5"/>
  <polygon points="356,706 361,709 356,712" fill="#555555"/>
  <!-- Bottom-right box -->
  <rect x="361" y="698" width="38" height="22" rx="3" fill="#E55B2B"/>

  <!-- ===================== PANEL 4: BEST PRACTICES ===================== -->
  <rect x="698" y="378" width="695" height="375" rx="7" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="708" y="387" width="194" height="37" rx="5" fill="#1565C0"/>
  <text x="719" y="411" fill="white" font-size="19" font-weight="bold">Best Practices</text>

  <!-- Item 1 -->
  <circle cx="742" cy="460" r="21" fill="#1565C0"/>
  <path d="M733,460 L739,467 L752,452" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="776" y="466" fill="#1A1A1A" font-size="17" font-weight="bold">Match type to value range.</text>

  <!-- Item 2 -->
  <circle cx="742" cy="528" r="21" fill="#1565C0"/>
  <path d="M733,528 L739,535 L752,520" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="776" y="534" fill="#1A1A1A" font-size="17" font-weight="bold">Use DECIMAL for financial data.</text>

  <!-- Item 3 -->
  <circle cx="742" cy="596" r="21" fill="#1565C0"/>
  <path d="M733,596 L739,603 L752,588" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="776" y="602" fill="#1A1A1A" font-size="17" font-weight="bold">Validate types during ingestion (CAST).</text>

  <!-- Item 4 -->
  <circle cx="742" cy="664" r="21" fill="#1565C0"/>
  <path d="M733,664 L739,671 L752,656" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="776" y="670" fill="#1A1A1A" font-size="17" font-weight="bold">Use explicit casts (not implicit).</text>

</svg>
