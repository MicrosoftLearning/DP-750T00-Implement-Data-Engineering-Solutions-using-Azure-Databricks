<svg width="1408" height="768" viewBox="0 0 1408 768" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,Helvetica,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1408" height="768" fill="#E4E4E4"/>

  <!-- ===================== PANEL 1: NUMERIC TYPES ===================== -->
  <rect x="15" y="15" width="668" height="348" rx="7" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="25" y="24" width="214" height="37" rx="5" fill="#1565C0"/>
  <text x="36" y="48" fill="white" font-size="19" font-weight="bold">Numeric Types</text>

  <!-- Integer Types pill -->
  <rect x="25" y="71" width="150" height="26" rx="13" fill="#1565C0"/>
  <text x="100" y="88" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Integer Types</text>

  <!-- BIGINT -->
  <text x="26" y="121" fill="#1A1A1A" font-size="13" font-weight="bold">BIGINT</text>
  <rect x="98" y="109" width="222" height="14" rx="2" fill="#E55B2B"/>
  <text x="324" y="121" fill="#1A1A1A" font-size="12" font-weight="bold">8B</text>
  <!-- INT -->
  <text x="26" y="151" fill="#1A1A1A" font-size="13" font-weight="bold">INT</text>
  <rect x="98" y="139" width="111" height="14" rx="2" fill="#E55B2B"/>
  <text x="213" y="151" fill="#1A1A1A" font-size="12" font-weight="bold">4B</text>
  <!-- SMALLINT -->
  <text x="26" y="181" fill="#1A1A1A" font-size="13" font-weight="bold">SMALLINT</text>
  <rect x="98" y="169" width="56" height="14" rx="2" fill="#E55B2B"/>
  <text x="158" y="181" fill="#1A1A1A" font-size="12" font-weight="bold">2B</text>
  <!-- TINYINT -->
  <text x="26" y="211" fill="#1A1A1A" font-size="13" font-weight="bold">TINYINT</text>
  <rect x="98" y="199" width="28" height="14" rx="2" fill="#E55B2B"/>
  <text x="130" y="211" fill="#1A1A1A" font-size="12" font-weight="bold">1B</text>

  <!-- Vertical divider -->
  <line x1="374" y1="66" x2="374" y2="356" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- Decimal vs Float pill -->
  <rect x="381" y="71" width="172" height="26" rx="13" fill="#1565C0"/>
  <text x="467" y="88" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Decimal vs Float</text>

  <!-- DECIMAL: stacked gold coins icon -->
  <ellipse cx="428" cy="152" rx="24" ry="7" fill="#B07010"/>
  <rect x="404" y="139" width="48" height="13" fill="#C88018"/>
  <ellipse cx="428" cy="139" rx="24" ry="7" fill="#D09010"/>
  <rect x="404" y="126" width="48" height="13" fill="#D09010"/>
  <ellipse cx="428" cy="126" rx="24" ry="7" fill="#E8A820"/>
  <rect x="404" y="113" width="48" height="13" fill="#E8A820"/>
  <ellipse cx="428" cy="113" rx="24" ry="7" fill="#F5C535"/>
  <text x="428" y="117" fill="#7A5000" font-size="12" font-weight="bold" text-anchor="middle">$</text>

  <text x="428" y="173" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">DECIMAL</text>
  <text x="384" y="193" fill="#555555" font-size="11">For financial</text>
  <text x="384" y="209" fill="#555555" font-size="11">exact precision.</text>

  <!-- VS large orange -->
  <text x="515" y="153" fill="#E55B2B" font-size="34" font-weight="900" text-anchor="middle">VS</text>
  <!-- Arrow right -->
