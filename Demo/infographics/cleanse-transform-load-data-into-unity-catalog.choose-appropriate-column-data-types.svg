  <circle cx="1028" cy="134" r="18" fill="none" stroke="#E55B2B" stroke-width="2.2"/>
  <line x1="1028" y1="121" x2="1028" y2="134" stroke="#E55B2B" stroke-width="2.2"/>
  <line x1="1028" y1="134" x2="1038" y2="141" stroke="#E55B2B" stroke-width="2.2"/>
  <rect x="1024" y="113" width="8" height="5" rx="1" fill="#E55B2B"/>
  <rect x="1044" y="127" width="5" height="8" rx="1" fill="#E55B2B"/>
  <rect x="1024" y="148" width="8" height="5" rx="1" fill="#E55B2B"/>
  <rect x="1010" y="127" width="5" height="8" rx="1" fill="#E55B2B"/>
  <!-- Arrow -->
  <line x1="1051" y1="134" x2="1062" y2="134" stroke="#555555" stroke-width="1.5"/>
  <polygon points="1062,131 1067,134 1062,137" fill="#555555"/>
  <!-- Globe right (blue) with small gear top-right -->
  <circle cx="1087" cy="134" r="18" fill="none" stroke="#1565C0" stroke-width="2.2"/>
  <ellipse cx="1087" cy="134" rx="10" ry="18" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="1069" y1="134" x2="1105" y2="134" stroke="#1565C0" stroke-width="1.5"/>
