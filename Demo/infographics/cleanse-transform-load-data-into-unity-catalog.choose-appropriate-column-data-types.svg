  <circle cx="1101" cy="119" r="3.5" fill="#E55B2B"/>
  <rect x="1097" y="109" width="8" height="4" rx="1" fill="#E55B2B"/>
  <rect x="1108" y="115" width="4" height="8" rx="1" fill="#E55B2B"/>
  <rect x="1097" y="124" width="8" height="4" rx="1" fill="#E55B2B"/>
  <rect x="1090" y="115" width="4" height="8" rx="1" fill="#E55B2B"/>
  <text x="1045" y="223" fill="#666666" font-size="11.5" text-anchor="middle">Clock icon, UTC</text>
  <text x="1045" y="239" fill="#666666" font-size="11.5" text-anchor="middle">normalized + timezone.</text>

  <!-- === TIMESTAMP_NTZ card === -->
  <rect x="1165" y="71" width="215" height="130" rx="8" fill="white" stroke="#E55B2B" stroke-width="2.5"/>
  <text x="1272" y="93" fill="#1A1A1A" font-size="13.5" font-weight="bold" text-anchor="middle">TIMESTAMP_NTZ</text>
  <!-- Clock (blue) with gear — centered at cx=1242 -->
  <circle cx="1242" cy="134" r="18" fill="none" stroke="#1565C0" stroke-width="2.2"/>
  <line x1="1242" y1="121" x2="1242" y2="134" stroke="#1565C0" stroke-width="2.2"/>
  <line x1="1242" y1="134" x2="1252" y2="141" stroke="#1565C0" stroke-width="2.2"/>
  <rect x="1238" y="113" width="8" height="5" rx="1" fill="#1565C0"/>
  <rect x="1262" y="128" width="5" height="8" rx="1" fill="#1565C0"/>
  <rect x="1238" y="149" width="8" height="5" rx="1" fill="#1565C0"/>
  <rect x="1220" y="128" width="5" height="8" rx="1" fill="#1565C0"/>
  <!-- Arrow -->
  <line x1="1269" y1="134" x2="1280" y2="134" stroke="#555555" stroke-width="1.5"/>
  <polygon points="1280,131 1285,134 1280,137" fill="#555555"/>
  <!-- Globe with large X — cx=1308, r=19 -->
  <circle cx="1308" cy="134" r="19" fill="none" stroke="#1565C0" stroke-width="2.2"/>
  <ellipse cx="1308" cy="134" rx="11" ry="19" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="1289" y1="134" x2="1327" y2="134" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="1294" y1="120" x2="1322" y2="120" stroke="#1565C0" stroke-width="1"/>
  <line x1="1294" y1="148" x2="1322" y2="148" stroke="#1565C0" stroke-width="1"/>
