  <polygon points="492,157.5 499,161 492,164.5" fill="#E55B2B"/>
  <!-- Arrow left -->
  <line x1="465" y1="174" x2="492" y2="174" stroke="#E55B2B" stroke-width="2.5"/>
  <polygon points="465,170.5 458,174 465,177.5" fill="#E55B2B"/>

  <!-- FLOAT/DOUBLE: calculator -->
  <rect x="560" y="108" width="34" height="44" rx="3" fill="#1565C0"/>
  <rect x="563" y="112" width="28" height="9" rx="1" fill="white"/>
  <rect x="563" y="125" width="7" height="7" rx="1" fill="white"/>
  <rect x="574" y="125" width="7" height="7" rx="1" fill="white"/>
  <rect x="585" y="125" width="7" height="7" rx="1" fill="white"/>
  <rect x="563" y="136" width="7" height="7" rx="1" fill="white"/>
  <rect x="574" y="136" width="7" height="7" rx="1" fill="white"/>
  <rect x="585" y="136" width="7" height="7" rx="1" fill="white"/>
  <rect x="563" y="147" width="18" height="4" rx="1" fill="white"/>
  <!-- Atom symbol -->
  <circle cx="621" cy="128" r="4" fill="#1565C0"/>
  <ellipse cx="621" cy="128" rx="17" ry="7" fill="none" stroke="#1565C0" stroke-width="1.8"/>
  <ellipse cx="621" cy="128" rx="17" ry="7" fill="none" stroke="#1565C0" stroke-width="1.8" transform="rotate(60 621 128)"/>
  <ellipse cx="621" cy="128" rx="17" ry="7" fill="none" stroke="#1565C0" stroke-width="1.8" transform="rotate(120 621 128)"/>

  <text x="588" y="173" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">FLOAT /</text>
  <text x="588" y="190" fill="#1A1A1A" font-size="14" font-weight="bold" text-anchor="middle">DOUBLE</text>
  <text x="548" y="210" fill="#555555" font-size="11">For scientific</text>
  <text x="548" y="226" fill="#555555" font-size="11">approximation.</text>

  <!-- ===================== PANEL 2: TEMPORAL TYPES ===================== -->
  <rect x="698" y="15" width="695" height="348" rx="7" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="708" y="24" width="201" height="37" rx="5" fill="#1565C0"/>
  <text x="719" y="48" fill="white" font-size="19" font-weight="bold">Temporal Types</text>

  <!-- === DATE card === -->
  <rect x="711" y="71" width="215" height="130" rx="8" fill="white" stroke="#E55B2B" stroke-width="2.5"/>
  <text x="818" y="93" fill="#1A1A1A" font-size="15" font-weight="bold" text-anchor="middle">DATE</text>
  <!-- Calendar icon -->
  <rect x="786" y="100" width="64" height="56" rx="5" fill="none" stroke="#E55B2B" stroke-width="2.5"/>
  <rect x="786" y="100" width="64" height="18" rx="5" fill="#E55B2B"/>
  <rect x="786" y="109" width="64" height="9" fill="#E55B2B"/>
  <rect x="797" y="95" width="8" height="13" rx="2" fill="#E55B2B"/>
  <rect x="831" y="95" width="8" height="13" rx="2" fill="#E55B2B"/>
  <rect x="792" y="122" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="805" y="122" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="818" y="122" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="831" y="122" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="792" y="135" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="805" y="135" width="9" height="9" rx="1" fill="#E55B2B"/>
  <rect x="818" y="135" width="9" height="9" rx="1" fill="#E55B2B"/>
  <text x="818" y="223" fill="#666666" font-size="12" text-anchor="middle">Calendar icon,</text>
  <text x="818" y="239" fill="#666666" font-size="12" text-anchor="middle">dates only.</text>

  <!-- === TIMESTAMP card === -->
  <rect x="938" y="71" width="215" height="130" rx="8" fill="white" stroke="#E55B2B" stroke-width="2.5"/>
  <text x="1045" y="93" fill="#1A1A1A" font-size="15" font-weight="bold" text-anchor="middle">TIMESTAMP</text>
  <!-- Globe left (blue) -->
  <circle cx="967" cy="134" r="20" fill="none" stroke="#1565C0" stroke-width="2.2"/>
  <ellipse cx="967" cy="134" rx="11" ry="20" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="947" y1="134" x2="987" y2="134" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="952" y1="120" x2="982" y2="120" stroke="#1565C0" stroke-width="1"/>
  <line x1="952" y1="148" x2="982" y2="148" stroke="#1565C0" stroke-width="1"/>
  <!-- Arrow -->
  <line x1="989" y1="134" x2="1000" y2="134" stroke="#555555" stroke-width="1.5"/>
  <polygon points="1000,131 1005,134 1000,137" fill="#555555"/>
