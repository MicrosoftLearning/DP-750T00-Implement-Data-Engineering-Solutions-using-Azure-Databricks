<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:763px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 763 247" width="763px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="130.2568" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.2549" x="20" y="120.0234">Retry Behavior</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.2568" x="20" y="136.5117">in Lakeflow Jobs</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="131.46" x="190.2568" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.46" x="200.2568" y="43.5352">Default Behavior</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.2959" x="374.7168" y="34.291">No retries by default</text><path d="M321.7168,38.2441 L331.7168,38.2441 C346.7168,38.2441 346.7168,29 361.7168,29 L371.7168,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.6855" x="374.7168" y="52.7793">Must configure explicitly</text><path d="M321.7168,38.2441 L331.7168,38.2441 C346.7168,38.2441 346.7168,47.4883 361.7168,47.4883 L371.7168,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M140.2568,122.9766 L150.2568,122.9766 C165.2568,122.9766 165.2568,38.2441 180.2568,38.2441 L190.2568,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="93.6641" x="190.2568" y="104.7324