<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="313px" preserveAspectRatio="none" style="width:646px;height:313px;background:#FFFFFF;" version="1.1" viewBox="0 0 646 313" width="646px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="131.3916" x="10" y="129.0986"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.3916" x="20" y="152.6338">Continuous Jobs</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="83.4463" x="20" y="169.1221">(Always-On)</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="113.6182" x="191.3916" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.6182" x="201.3916" y="43.5352">Configuration</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.126" x="358.0098" y="34.291">Trigger type: Continuous</text><path d="M305.0098,38.2441 L315.0098,38.2441 C330.0098,38.2441 330.0098,29 345.0098,29 L355.0098,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="358.0098" y="52.7793">Task retry mode: On failure / Never</text><path d="M305.0098,38.2441 L315.0098,38.2441 C330.0098,38.2441 330.0098,47.4883 345.0098,47.4883 L355.0098,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M141.3916,155.5869 L151.3916,155.5869 C166.3916,155.5869 166.3916,38.2441 181.3916,38.2441 L191.3916,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="154.2852" x="191.3916" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.2852" x="201.3916" y="100.0234">Exponential Backoff</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="236.1064" x="398.6768" y="72.291">Activates after consecutive failures</text><path d="M345.6768,94.7324 L355.6768,94.7324 C370.6768,94.7324 370.6768,67 385.6768,67 L395.6768,67" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.832" x="398.6768" y="90.7793">Wait period increases with failures</text><path d="M345.6768,94.7324 L355.6768,94.7324 C370.6768,94.7324 370.6768,85.4883 385.6768,85.4883 L395.6768,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157.8896" x="398.6768" y="109.2676">Max wait set by system</text><path d="M345.6768,94.7324 L355.6768,94.7324 C370.6768,94.7324 370.6768,103.9766 385.6768,103.9766 L395.6768,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.123" x="398.6768" y="127.7559">Resets after successful run</text><path d="M345.6768,94.7324 L355.6768,94.7324 C370.6768,94.7324 370.6768,122.4648 385.6768,122.4648 L395.6768,122.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M141.3916,155.5869 L151.3916,155.5869 C166.3916,155.5869 166.3916,94.7324 181.3916,94.7324 L191.3916,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="132.9639" x="191.3916" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.9639" x="201.3916" y="156.5117">Task Retry Mode</text><text fill="#000000" font-fami