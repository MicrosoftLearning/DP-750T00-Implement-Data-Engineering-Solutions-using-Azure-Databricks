</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.5859" x="332.5596" y="81.0234">Instant, elastic compute</text><path d="M279.5596,103.4648 L289.5596,103.4648 C304.5596,103.4648 304.5596,75.7324 319.5596,75.7324 L329.5596,75.7324" fill="none" style="stroke:#FFB900;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="177.0371" x="332.5596" y="99.5117">Fast startup &amp; autoscaling</text><path d="M279.5596,103.4648 L289.5596,103.4648 C304.5596,103.4648 304.5596,94.2207 319.5596,94.2207 L329.5596,94.2207" fill="none" style="stroke:#FFB900;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.7988" x="332.5596" y="118">Managed by Databricks</text><path d="M279.5596,103.4648 L289.5596,103.4648 C304.5596,103.4648 304.5596,112.709 319.5596,112.709 L329.5596,112.709" fill="none" style="stroke:#FFB900;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="188.8359" x="332.5596" y="136.4883">Cost-efficient, no idle costs</text><path d="M279.5596,103.4648 L289.5596,103.4648 C304.5596,103.4648 304.5596,131.1973 319.5596,131.1973 L329.5596,131.1973" fill="none" style="stroke:#FFB900;stroke-width:3;"/><path d="M141.5967,131.4531 L151.5967,131.4531 C166.5967,131.4531 166.5967,103.4648 181.5967,103.4648 L191.5967,103.4648" fill="none" style="stroke:#181818;stroke-width:3;"/><rect fill="#FFB900" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FFB900;stroke-width:3;" width="42.0664" x="191.5967" y="149.9297"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="22.0664" x="201.5967" y="173.4648">Pro</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.9805" x="286.6631" y="154.9766">More customizable</text><path d="M233.6631,168.1738 L243.6631,168.