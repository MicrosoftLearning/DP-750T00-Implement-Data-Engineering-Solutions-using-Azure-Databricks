<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="294px" preserveAspectRatio="none" style="width:776px;height:294px;background:#FFFFFF;" version="1.1" viewBox="0 0 776 294" width="776px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="122.7373" x="10" y="119.8545"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="102.7373" x="20" y="143.3896">Task Execution</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.2959" x="20" y="159.8779">Patterns</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="127.7275" x="182.7373" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.7275" x="192.7373" y="43.5352">Serial Execution</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="152.3525" x="363.4648" y="25.0469">Tasks run sequentially</text><path d="M310.4648,38.2441 L320.4648,38.2441 C335.4648,38.2441 335.4648,19.7559 350.4648,19.7559 L360.4648,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.6699" x="363.4648" y="43.5352">Safer for dependent data</text><path d="M310.4648,38.2441 L320.4648,38.2441 C335.4648,38.2441 335.4648,38.2441 350.4648,38.2441 L360.4648,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.1309" x="363.4648" y="62.0234">Slower overall</text><path d="M310.4648,38.2441 L320.4648,38.2441 C335.4648,38.2441 335.4648,56.7324 350.4648,56.7324 L360.4648,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M132.7373,146.3428 L142.7373,146.3428 C157.7373,146.3428 157.7373,38.2441 172.7373,38.2441 L182.7373,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="139.7041" x="182.7373" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.7041" x="192.7373" y="100.0234">Parallel Execution</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.2188" x="375.4414" y="81.5352">Independent tasks run simultaneously</text><path d="M322.4414,94.7324 L332.4414,94.7324 C347.4414,94.7324 347.4414,76.2441 362.4414,76.2441 L372.4414,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="179.6006" x="375.4414" y="100.0234">Reduces total job duration</text><path d="M322.4414,94.7324 L332.4414,94.7324 C347.4414,94.7324 347.4414,94.7324 362.4414,94.7324 L372.4414,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.2988" x="375.4414" y="118.5117">Requires more compute</text><path d="M322.4414,94.7324 L332.4414,94.7324 C347.4414,94.7324 347.4414,113.2207 362.4414,113.2207 L372.4414,113.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M132.7373,146.3428 L142.7373,146.3428 C157.7373,146.3428 157.7373,94.7324 172.7373,94.7324 L182.7373,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="137.4756" x="182.7373" y="161.2207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.4756" x="192.7373" y="184.7559">Compute Sharing</text><rect fill="#FFB900" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FFB900;stroke-width:3;" width="132.6221" x="370.2129" y="132.9766"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.6221" x="380.2129" y="156.5117">Shared Compute</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.7217" x="555.835" y="138.0234">Same cluster for related tasks</text><path d="M502.835,151.2207 L512.835,151.2207 C527.835,151.2207 527.835,132.7324 542.835,132.7324 L552.835,132.7324" fill="none" style="stroke:#FFB900;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.6768" x="555.835" y="156.5117">Reduces startup latency</text><path d="M502.835,151.2207 L512.835,151.2207 C527.835,151.2207 527.835,151.2207 542.835,151.2207 L552.835,151.2207" fill="none" style="stroke:#FFB900;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.7793" x="555.835" y="175">Shared memory/CPU</text><path d="M502.835,151.2207 L512.835,151.2207 C527.835,151.2207 527.835,169.709 542.835,169.709 L552.835,169.709" fill="none" style="stroke:#FFB900;stroke-width:3;"/><path d="M320.2129,179.4648 L330.2129,179.4648 C345.2129,179.4648 345.2129,151.2207 360.2129,151.2207 L370.2129,151.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><rect fill="#FFB900" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FFB900;stroke-width:3;" width="147.7842" x="370.2129" y="189.4648"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.7842" x="380.2129" y="213">Dedicated Clusters</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="123.6143" x="570.9971" y="203.7559">Isolated resources</text><path d="M517.9971,207.709 L527.9971,207.709 C542.9971,207.709 542.9971,198.4648 557.9971,198.4648 L567.9971,198.4648" fill="none" style="