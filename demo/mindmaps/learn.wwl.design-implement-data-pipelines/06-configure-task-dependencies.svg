<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="265px" preserveAspectRatio="none" style="width:621px;height:265px;background:#FFFFFF;" version="1.1" viewBox="0 0 621 265" width="621px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="123.4482" x="10" y="105.2207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="103.4482" x="20" y="128.7559">Configure Task</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="95.04" x="20" y="145.2441">Dependencies</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="99.6523" x="183.4482" y="28.7324"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="79.6523" x="193.4482" y="52.2676">How to Add</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.168" x="336.1006" y="24.5352">Select task in DAG</text><path d="M283.1006,46.9766 L293.1006,46.9766 C308.1006,46.9766 308.1006,19.2441 323.1006,19.2441 L333.1006,19.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.999" x="336.1006" y="43.0234">Set "Depends on" field</text><path d="M283.1006,46.9766 L293.1006,46.9766 C308.1006,46.9766 308.1006,37.7324 323.1006,37.7324 L333.1006,37.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.9434" x="336.1006" y="61.5117">Select upstream task</text><path d="M283.1006,46.9766 L293.1006,46.9766 C308.1006,46.9766 308.1006,56.2207 323.1006,56.2207 L333.1006,56.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="63.0342" x="336.1006" y="80">Save task</text><path d="M283.1006,46.9766 L293.1006,46.9766 C308.1006,46.9766 308.1006,74.709 323.1006,74.709 L333.1006,74.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M133.4482,131.709 L143.4482,131.709 C158.4482,131.709 158.4482,46.9766 173.4482,46.9766 L183.4482,46.9766" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="148.7275" x="183.4482" y="93.9531"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.7275" x="193.4482" y="117.4883">Execution Behavior</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="177.0713" x="385.1758" y="99">Sequential by dependency</text><path d="M332.1758,112.1973 L342.1758,112.1973 C357.1758,112.1973 357.1758,93.709 372.1758,93.709 L382.1758,93.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224.0957" x="385.1758" y="117.4883">Independent tasks run in parallel</text><path d="M332.1758,112.1973 L342.1758,112.1973 C357.1758,112.1973 357.1758,112.1973 372.1758,112.1973 L382.1758,112.1973" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.9365" x="385.1758" y="135.9766">Clear execution path</text><path d="M332.1758,112.1973 L342.1758,112.1973 C357.1758,112.1973 357.1758,130.6855 372.1758,130.6855 L382.1758,130.6855" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M133.4482,131.709 L143.4482,131.709 C158.4482,131.709 158.4482,112.1973 173.4482,112.1973 L183.4482,112.1973" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.