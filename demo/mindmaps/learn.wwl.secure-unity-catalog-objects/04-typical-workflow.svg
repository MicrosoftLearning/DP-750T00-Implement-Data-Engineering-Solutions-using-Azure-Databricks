<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="360px" preserveAspectRatio="none" style="width:749px;height:360px;background:#FFFFFF;" version="1.1" viewBox="0 0 749 360" width="749px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="135.4727" x="10" y="161.2207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.4727" x="20" y="184.7559">Typical Workflow</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="186.2979" x="195.4727" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.2979" x="205.4727" y="43.5352">1. Identify sensitive data</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="121.3721" x="434.7705" y="34.291">Sensitive columns</text><path d="M381.7705,38.2441 L391.7705,38.2441 C406.7705,38.2441 406.7705,29 421.7705,29 L431.7705,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="434.7705" y="52.7793">Row-level segmentation rules</text><path d="M381.7705,38.2441 L391.7705,38.2441 C406.7705,38.2441 406.7705,47.4883 421.7705,47.4883 L431.7705,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M145.4727,179.4648 L155.4727,179.4648 C170.4727,179.4648 170.4727,38.2441 185.4727,38.2441 L195.4727,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="155.9258" x="195.4727" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.9258" x="205.4727" y="100.0234">2. Choose approach</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.0146" x="404.3984" y="90.7793">Multi-table / strict abstraction?</text><path d="M351.3984,94.7324 L361.3984,94.7324 C376.3984,94.7324 376.3984,85.4883 391.3984,85.4883 L401.3984,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="216.5898" x="404.3984" y="109.2676">If not &#8594; Row &amp; Column Security</text><path d="M351.3984,94.7324 L361.3984,94.7324 C376.3984,94.7324 376.3984,103.9766 391.3984,103.9766 L401.3984,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M145.4727,179.4648 L155.4727,179.4648 C170.4727,179.4648 170.4727,94.7324 185.4727,94.7324 L195.4727,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="221.5713" x="195.4727" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.5713" x="205.4727" y="156.5117">3. For Row &amp; Column Security</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="267.3057" x="470.0439" y="138.0234">Design masking functions (per column)</text><path d="M417.0439,151.2207 L427.0439,151.2207 C442.0439,151.2207 442.0439,132.7324 457.0439,132.7324 L467.0439,132.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="173.5645" x="470.0439" y="156.5117">Design row filter function</text><path d="M417.0439,151.2207 L427.0439,151.2207 C442.0439,151.2207 442.0439,151.2207 457.0439,151.2207 L467.0439,151.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="220.4795" x="47