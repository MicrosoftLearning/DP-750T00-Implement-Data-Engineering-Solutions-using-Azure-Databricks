<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="191px" preserveAspectRatio="none" style="width:768px;height:191px;background:#FFFFFF;" version="1.1" viewBox="0 0 768 191" width="768px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="179.8926" x="10" y="68.2441"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="159.8926" x="20" y="91.7793">Security Considerations</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="20" y="108.2676">&amp; Best Practices</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="179.127" x="239.8926" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="159.127" x="249.8926" y="43.5352">Never hardcode secrets</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="472.0195" y="25.0469">Use Azure Key Vault or Databricks secrets</text><path d="M419.0195,38.2441 L429.0195,38.2441 C444.0195,38.2441 444.0195,19.7559 459.0195,19.7559 L469.0195,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.8184" x="472.0195" y="43.5352">Prevents accidental exposure</text><path d="M419.0195,38.2441 L429.0195,38.2441 C444.0195,38.2441 444.0195,38.2441 459.0195,38.2441 L469.0195,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.2998" x="472.0195" y="62.0234">Safe for version control</text><path d="M419.0195,38.2441 L429.0195,38.2441 C444.0195,38.2441 444.0195,56.7324 459.0195,56.7324 L469.0195,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M189.8926,94.7324 L199.8926,94.7324 C214.8926,94.7324 214.8926,38.2441 229.8926,38.2441 L239.8926,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="119.5723" x="239.8926" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.5723" x="249.8926" y="100.0234">Secret rotation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.1455" x="412.4648" y="81.5352">Client secrets expire</text><path d="M359.4648,94.7324 L369.4648,94.7324 C384.4648,94.7324 384.4648,76.2441 399.4648,76.2441 L409.4648,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.3193" x="412.4648" y="100.0234">Must be rotated periodically</text><path d="M359.4648,94.7324 L369.4648,94.7324 C384.4648,94.7324 384.4648,94.7324 399.4648,94.7324 L409.4648,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="186.2383" x="412.4648" y="118.5117">Know the rotation schedule</text><path d="M359.4648,94.7324 L369.4648,94.7324 C384.4648,94.7324 384.4648,113.2207 399.4648,113.2207 L409.4648,113.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M189.8926,94.7324 L199.8926,94.7324 C214.8926,94.7324 214.8926,94.7324 229.8926,94.7324 L239.8926,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="118.0547" x="239.8926" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.0547" x="249.8926" y="156.5117">Least privilege</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="205.8916" x="410.9473" y="147.2676">Specific storage locations only</text><path d="M357.9473,151.2207 L367.9473,151.2207 C382.9473,151.2207 382.9473,141.9766 397.9473,141.9766 L407.9473,141.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224.4717" x="410.9473" y="165.7559">Limit blast radius of compromise</text><path d="M357.9473,151.2207 L367.9473,151.2207 C382.9473,151.2207 382.9473,160.4648 397.9473,160.4648 L407.9473,160.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M189.8926,94.7324 L199.8926,94.7324 C214.8926,94.7324 214.8926,151.2207 229.8926,151.2207 L239.8926,151.2207" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><?plantuml-src VPFHQzH04CRVyrSC2A8SdEbPMvKYjLVoqbCALtqIP6ztSXcwsGspazgpz7ztabmgZPppjCny-_s-MTZp98Qbfk1gqsHdINOUFsKV7JPIlSfVmqC6MXV6tcuvji4jeuyCBuhYNN5yqizM5F3VRX63xBjbNq_QcuhiRS2KuEqypnv7rj51LfwVlhyydh8ctUUkamH5NtzPYuEiijnyoFCfQzBzBollIrcRUEyxpSD1nTcR_NFFO8ssPP8TB6D8v92Da9v-X9TmWKdWceqLifYosGo-uXqoL8QTZGuXeMMKRZBx2TyImkVVBIDSuGw-czOBAFJIYDcmnaxFvTUiNa4I66iL6yHumFic9dKO56jJ8fHgeSoacS3g9Xnz5sJTMm57wUCE5vQUr6V4T6uqUdrfTPKD3XVGGODCqP4rtky6nLM8lq0gVFA4P2jqhUySO8L63HgcE_Au7GCsQAaa2qaYcos2ZtPuFOXXz5rHJOhstNqsZbeTbhfAtN2iAM5sZle3zhyWEvelyiN9VF47?></g></svg>