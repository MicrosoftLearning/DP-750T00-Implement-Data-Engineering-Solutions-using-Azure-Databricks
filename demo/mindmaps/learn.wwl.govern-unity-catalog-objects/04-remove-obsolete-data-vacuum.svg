<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:680px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 680 247" width="680px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="148.7617" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.1045" x="20" y="120.0234">Remove Obsolete</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.7617" x="20" y="136.5117">Data with VACUUM</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="104.123" x="208.7617" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.123" x="218.7617" y="43.5352">What it does</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.334" x="365.8848" y="25.0469">Removes unreferenced data files</text><path d="M312.8848,38.2441 L322.8848,38.2441 C337.8848,38.2441 337.8848,19.7559 352.8848,19.7559 L362.8848,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.1465" x="365.8848" y="43.5352">Files older than retention threshold</text><path d="M312.8848,38.2441 L322.8848,38.2441 C337.8848,38.2441 337.8848,38.2441 352.8848,38.2441 L362.8848,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.8438" x="365.8848" y="62.0234">Permanently deletes data</text><path d="M312.8848,38.2441 L322.8848,38.2441 C337.8848,38.2441 337.8848,56.7324 352.8848,56.7324 L362.8848,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M158.7617,122.9766 L168.7617,122.9766 C183.7617,122.9766 183.7617,38.2441 198.7617,38.2441 L208.7617,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="65.0967" x="208.7617" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45.0967" x="218.7617" y="100.0234">Syntax</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="120.2715" x="326.8584" y="90.7793">VACUUM &lt;table&gt;</text><path d="M273.8584,94.7324 L283.8584,94.7324 C298.8584,94.7324 298.8584,85.4883 313.8584,85.4883 L323.8584,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.4883" x="326.8584" y="109.2676">VACUUM &lt;table&gt; RETAIN N HOURS</text><path d="M273.8584,94.7324 L283.8584,94.7324 C298.8584,94.7324 298.8584,103.9766 313.8584,103.9766 L323.8584,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M158.7617,122.9766 L168.7617,122.9766 C183.7617,122.9766 183.7617,94.7324 198.7617,94.7324 L208.7617,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="66.0537" x="208.7617" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="46.0537" x="218.7617" y="156.5117">Impact</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="251.0908" x="327.8154" y="147.2676">Time travel to removed versions fails</text><path d="M274.8154,151.2207 L284.8154,151.2207 C299.8154,151.2207 299.8154,141.9766 314.8154,141.9766 L324.8154,141.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.5781" x="327.8154" y="165.7559">Irreversible operation</text><path d="M274.8154,151.2207 L284.8154,151.2207 C299.8154,151.2207 299.8154,160.4648 314.8154,160.4648 L324.8154,160.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M158.7617,122.9766 L168.7617,122.9766 C183.7617,122.9766 183.7617,151.2207 198.7617,151.2207 L208.7617,151.2207" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="130.0518" x="208.7617" y="189.4648"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.0518" x="218.7617" y="213">Deletion vectors</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="251.6855" x="391.8135" y="194.5117">Mark rows as deleted without rewrite</text><path d="M338.8135,207.709 L348.8135,207.709 C363.8135,207.709 363.8135,189.2207 378.8135,189.2207 L388.8135,189.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="238.5742" x="391.8135" y="213">VACUUM alone doesn't purge them</text><path d="M338.8135,207.709 L348.8135,207.709 C363.8135,207.709 363.8135,207.709 378.8135,207.709 L388.8135,207.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="276.6299" x="391.8135" y="231.4883">Requires REORG TABLE ... APPLY (PURGE)</text><path d="M338.8135,207.709 L348.8135,207.709 C363.8135,207.709 363.8135,226.1973 378.8135,226.1973 L388.8135,226.1973" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M158.7617,122.9766 L168.7617,122.9766 C183.7617,122.9766 183.7617,207.709 198.7617,207.709 L208.7617,207.709" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><?plantuml-src 