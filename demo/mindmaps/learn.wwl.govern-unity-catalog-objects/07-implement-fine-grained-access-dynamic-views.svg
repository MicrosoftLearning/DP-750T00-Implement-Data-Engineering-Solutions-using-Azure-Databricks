<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="304px" preserveAspectRatio="none" style="width:757px;height:304px;background:#FFFFFF;" version="1.1" viewBox="0 0 757 304" width="757px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="159.5693" x="10" y="124.7324"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.5693" x="20" y="148.2676">Fine-Grained Access</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.0508" x="20" y="164.7559">with Dynamic Views</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="156.582" x="219.5693" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.582" x="229.5693" y="43.5352">Recipient properties</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="228.0605" x="429.1514" y="34.291">ALTER RECIPIENT SET PROPERTIES</text><path d="M376.1514,38.2441 L386.1514,38.2441 C401.1514,38.2441 401.1514,29 416.1514,29 L426.1514,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="255.5547" x="429.1514" y="52.7793">Key-value pairs (e.g., country_region)</text><path d="M376.1514,38.2441 L386.1514,38.2441 C401.1514,38.2441 401.1514,47.4883 416.1514,47.4883 L426.1514,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M169.5693,151.2207 L179.5693,151.2207 C194.5693,151.2207 194.5693,38.2441 209.5693,38.2441 L219.5693,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" wid