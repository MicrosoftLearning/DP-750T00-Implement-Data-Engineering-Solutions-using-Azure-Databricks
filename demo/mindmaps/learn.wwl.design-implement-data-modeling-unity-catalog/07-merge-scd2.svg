<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:692px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 692 247" width="692px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="98.2031" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70.1094" x="20" y="120.0234">MERGE for</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78.2031" x="20" y="136.5117">SCD Type 2</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="106.6455" x="158.2031" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="86.6455" x="168.2031" y="43.5352">MERGE Logic</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="268.4063" x="317.8486" y="25.0469">Match on natural key + is_current=true</text><path d="M264.8486,38.2441 L274.8486,38.2441 C289.8486,38.2441 289.8486,19.7559 304.8486,19.7559 L314.8486,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="339.5" x="317.8486" y="43.5352">WHEN MATCHED + changed &#8594; expire current row</text><path d="M264.8486,38.2441 L274.8486,38.2441 C289.8486,38.2441 289.8486,38.2441 304.8486,38.2441 L314.8486,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="270.4912" x="317.8486" y="62.0234">WHEN NOT MATCHED &#8594; insert new row</text><path d="M264.8486,38.2441 L274.8486,38.2441 C289.8486,38.2441 289.8486,56.7324 304.8486,56.7324 L314.8486,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M108.2031,122.9766 L118.2031,122.9766 C133.2031,122.9766 133.2031,38.2441 148.2031,38.2441 L158.2031,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="138.3164" x="158.2031" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.3164" x="168.2031" y="100.0234">Two-Step Pattern</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="244.4941" x="349.5195" y="90.7793">Step 1: MERGE to expire old records</text><path d="M296.5195,94.7324 L306.5195,94.7324 C321.5195,94.7324 321.5195,85.4883 336.5195,85.4883 L346.5195,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="330.8867" x="349.5195" y="109.2676">Step 2: INSERT new versions for updated records</text><path d="M296.5195,94.7324 L306.5195,94.7324 C321.5195,94.7324 321.5195,103.9766 336.5195,103.9766 L346.5195,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M108.2031,122.9766 L118.2031,122.9766 C133.2031,122.9766 133.2031,94.7324 148.2031,94.7324 L158.2031,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="176.3994" x="158.2031" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3994" x="168.2031" y="156.5117">Key Columns in MERGE</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.9932" x="387.6025" y="147.2676">valid_to = current_timestamp()</text><path d="M334.6025,151.2207 L344.6025,151.2207 C359.6025,151.2207 359.6025,141.9766 374.6025,141.9766 L384.6025,141.9766