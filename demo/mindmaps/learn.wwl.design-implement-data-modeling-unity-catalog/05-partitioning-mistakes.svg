<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:682px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 682 247" width="682px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="140.3877" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78.5176" x="20" y="120.0234">Partitioning</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="120.3877" x="20" y="136.5117">Mistakes to Avoid</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="139.3418" x="200.3877" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.3418" x="210.3877" y="43.5352">Over-partitioning</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="228.0742" x="392.7295" y="25.0469">Too many unique partition values</text><path d="M339.7295,38.2441 L349.7295,38.2441 C364.7295,38.2441 364.7295,19.7559 379.7295,19.7559 L389.7295,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="254.167" x="392.7295" y="43.5352">Many small files &#8594; poor performance</text><path d="M339.7295,38.2441 L349.7295,38.2441 C364.7295,38.2441 364.7295,38.2441 379.7295,38.2441 L389.7295,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="277.6211" x="392.7295" y="62.0234">High cardinality columns (ID, timestamp)</text><path d="M339.7295,38.2441 L349.7295,38.2441 C364.7295,38.2441 364.7295,56.7324 379.7295,56.7324 L389.7295,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M150.3877,122.9766 L160.3877,122.9766 C175.3877,122.9766 175.3877,38.2441 190.3877,38.2441 L200.3877,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="148.4199" x="200.3877" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="210.3877" y="100.0234">Under-partitioning</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218.0869" x="401.8076" y="90.7793">Too few partitions at large scale</text><path d="M348.8076,94.7324 L358.8076,94.7324 C373.8076,94.7324 373.8076,85.4883 388.8076,85.4883 L398.8076,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.7139" x="401.8076" y="109.2676">No pruning benefit</text><path d="M348.8076,94.7324 L358.8076,94.7324 C373.8076,94.7324 373.8076,103.9766 388.8076,103.9766 L398.8076,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M150.3877,122.9766 L160.3877,122.9766 C175.3877,122.9766 175.3877,94.7324 190.3877,94.7324 L200.3877,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="128.0693" x="200.3877" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="108.0693" x="210.3877" y="156.5117">Wrong Columns</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.7305" x="381.457" y="147.2676">Partitioning by rarely filtered columns</text><path d="M328.457,151.2207 L338.457,151.2207 C353.457,151.2207 353.457,141.9766 368.457,141.9766 L378.457,141.9766" fill="none" style="strok