<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="208px" preserveAspectRatio="none" style="width:792px;height:208px;background:#FFFFFF;" version="1.1" viewBox="0 0 792 208" width="792px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="160.1982" x="10" y="76.7207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.1982" x="20" y="100.2559">Managed vs External</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.4102" x="20" y="116.7441">Decision Criteria</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="152.2002" x="220.1982" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="132.2002" x="230.1982" y="43.5352">Use Managed When</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.3262" x="425.3984" y="25.0469">Full lifecycle control desired</text><path d="M372.3984,38.2441 L382.3984,38.2441 C397.3984,38.2441 397.3984,19.7559 412.3984,19.7559 L422.3984,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.2627" x="425.3984" y="43.5352">Auto-optimization features needed</text><path d="M372.3984,38.2441 L382.3984,38.2441 C397.3984,38.2441 397.3984,38.2441 412.3984,38.2441 L422.3984,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.2129" x="425.3984" y="62.0234">Data not needed after table dropped</text><path d="M372.3984,38.2441 L382.3984,38.2441 C397.3984,38.2441 397.3984,56.7324 412.3984,56.7324 L422.3984,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M170.1982,103.209 L180.1982,103.209 C195.1982,103.209 195.1982,38.2441 210.1982,38.2441 L220.1982,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="146.0547" x="220.1982" y="85.2207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.0547" x="230.1982" y="108.7559">Use External When</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.4385" x="419.2529" y="81.0234">Data must outlive table definition</text><path d="M366.2529,103.4648 L376.2529,103.4648 C391.2529,103.4648 391.2529,75.7324 406.2529,75.7324 L416.2529,75.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="237.6924" x="419.2529" y="99.5117">External systems read data directly</text><path d="M366.2529,103.4648 L376.2529,103.4648 C391.2529,103.4648 391.2529,94.2207 406.2529,94.2207 L416.2529,94.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5508" x="419.2529" y="118">Migrating from Hive metastore</text><path d="M366.2529,103.4648 L376.2529,103.4648 C391.2529,103.4648 391.2529,112.709 406.2529,112.709 L416.2529,112.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.2354" x="419.2529" y="136.4883">Non-Delta/Iceberg format required</text><path d="M366.2529,103.4648 L376.2529,103.4648 C391.2529,103.4648 391.2529,131.1973 406.2529,131.1973 L416.2529,131.1973" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M170.1982,103.209 L180.1982,103.209 C195.1982,103.209 195.1982,103.4648 210.1982,10