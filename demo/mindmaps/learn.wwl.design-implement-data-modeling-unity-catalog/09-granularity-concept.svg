<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:693px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 693 247" width="693px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="95.0586" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.0586" x="20" y="120.0234">Granularity</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45.418" x="20" y="136.5117">(Grain)</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="86.7871" x="155.0586" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66.7871" x="165.0586" y="43.5352">Definition</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.9512" x="294.8457" y="34.291">Level of detail per row</text><path d="M241.8457,38.2441 L251.8457,38.2441 C266.8457,38.2441 266.8457,29 281.8457,29 L291.8457,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.2939" x="294.8457" y="52.7793">What each row represents</text><path d="M241.8457,38.2441 L251.8457,38.2441 C266.8457,38.2441 266.8457,47.4883 281.8457,47.4883 L291.8457,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M105.0586,122.9766 L115.0586,122.9766 C130.0586,122.9766 130.0586,38.2441 145.0586,38.2441 L155.0586,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="130.0586" x="155.0586" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.0586" x="165.0586" y="100.0234">Fact Table Grain</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="317.502" x="338.1172" y="90.7793">Determined by combination of dimension keys</text><path d="M285.1172,94.7324 L295.1172,94.7324 C310.1172,94.7324 310.1172,85.4883 325.1172,85.4883 L335.1172,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="198.8301" x="338.1172" y="109.2676">"One row per order line item"</text><path d="M285.1172,94.7324 L295.1172,94.7324 C310.1172,94.7324 310.1172,103.9766 325.1172,103.9766 L335.1172,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M105.0586,122.9766 L115.0586,122.9766 C130.0586,122.9766 130.0586,94.7324 145.0586,94.7324 L155.0586,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="174.9775" x="155.0586" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.9775" x="165.0586" y="156.5117">Dimension Table Grain</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.5771" x="383.0361" y="138.0234">One row per entity (current state)</text><path d="M330.0361,151.2207 L340.0361,151.2207 C355.0361,151.2207 355.0361,132.7324 370.0361,132.7324 L380.0361,132.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.6143" x="383.0361" y="156.5117">One row per entity per version (SCD Type 2)</text><path d="M330.0361,151.2207 L340.0361,151.2207 C355.0361,151.2207 355.0361,151.2207 370.0361,151.2207 L380.0361,151.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="236.0107" x="383.0361" y="175">One row per entity per time period</text><path d="M330.0361,151.2207 L340.0361,151.2207 C355.0361,151.2207 355.0361,169.709 370.0361,169.709 L380.0361,169.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M105.0586,122.9766 L115.0586,122.9766 C130.0586,122.9766 130.0586,151.2207 145.0586,151.2207 L155.0586,151.2207" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="101.5117" x="155.0586" y="189.4648"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.5117" x="165.0586" y="213">Critical Rule</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.0664" x="309.5703" y="203.7559">Once aggregated, detail is lost forever</text><path d="M256.5703,207.709 L266.5703,207.709 C281.5703,207.709 281.5703,198.4648 296.5703,198.4648 L306.5703,198.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224.0615" x="309.5703" y="222.2441">Always document grain explicitly</text><path d="M256.5703,207.709 L266.5703,207.709 C281.5703,207.709 281.5703,216.9531 296.5703,216.9531 L306.5703,216.9531" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M105.0586,122.9766 L115.0586,122.9766 C130.0586,122.9766 130.0586,207.709 145.0586,207.709 L155.0586,207.709" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><?plantuml-src VPFVQzim4CVV_LSSxKiIHkfw_R6LChebU2-5GHVOIs78qjav8aj6EhSrPV_x92NfEfVq7eJkTD_xdCxMZMVXk2MZMj5brvu7ZL-oAuKThoVv59up2FPDo4tZR6_KmchhuBWipykpYtHsImRVHajhU1UjaxtahjOaDmQzXu_pFFkpPvqUPENvvQVbsPWrYlvVTTH1cUmVgpZ8gklgSvwFMQFekwmyMM1Lzad7dEU36TSdkt7FuBiJfjV24G_tPX8yCjDiDeCbrcI8oPhWpNx3BJwW1bk3GXQaeKC7pZvk3t-j1GCAkOuXSDWvz6ZOnqAba