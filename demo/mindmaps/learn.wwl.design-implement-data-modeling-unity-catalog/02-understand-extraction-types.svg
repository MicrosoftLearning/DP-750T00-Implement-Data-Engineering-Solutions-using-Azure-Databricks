<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="243px" preserveAspectRatio="none" style="width:688px;height:243px;background:#FFFFFF;" version="1.1" viewBox="0 0 688 243" width="688px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="88.6123" x="10" y="94.4414"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.6123" x="20" y="117.9766">Extraction</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="39.915" x="20" y="134.4648">Types</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="117.3301" x="148.6123" y="28.7324"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.3301" x="158.6123" y="52.2676">Full Extraction</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.5303" x="318.9424" y="24.5352">Reads entire dataset each run</text><path d="M265.9424,46.9766 L275.9424,46.9766 C290.9424,46.9766 290.9424,19.2441 305.9424,19.2441 L315.9424,19.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.5127" x="318.9424" y="43.0234">Good for small volumes</text><path d="M265.9424,46.9766 L275.9424,46.9766 C290.9424,46.9766 290.9424,37.7324 305.9424,37.7324 L315.9424,37.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="186.2656" x="318.9424" y="61.5117">No change tracking needed</text><path d="M265.9424,46.9766 L275.9424,46.9766 C290.9424,46.9766 290.9424,56.2207 305.9424,56.2207 L315.9424,56.2207" fill="none" style="