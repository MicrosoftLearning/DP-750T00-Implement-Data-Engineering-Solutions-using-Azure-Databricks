<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:639px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 639 247" width="639px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="93.4453" x="10" y="96.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="73.4453" x="20" y="120.0234">Mixed SCD</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66.9854" x="20" y="136.5117">Strategies</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="144.9268" x="153.4453" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.9268" x="163.4453" y="43.5352">Within Same Table</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="276.0488" x="351.3721" y="34.291">Different columns &#8594; different SCD types</text><path d="M298.3721,38.2441 L308.3721,38.2441 C323.3721,38.2441 323.3721,29 338.3721,29 L348.3721,29" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="235.6689" x="351.3721" y="52.7793">e.g., email = Type 1, city = Type 2</text><path d="M298.3721,38.2441 L308.3721,38.2441 C323.3721,38.2441 323.3721,47.4883 338.3721,47.4883 L348.3721,47.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M103.4453,122.9766 L113.4453,122.9766 C128.4453,122.9766 128.4453,38.2441 143.4453,38.2441 L153.4453,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="134.6318" x="153.4453" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.6318" x="163.4453" y="100.0234">Hybrid Approach</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="242.2998" x="341.0771" y="90.7793">Type 1 for non-analytical attributes</text><path d="M288.0771,94.7324 L298.0771,94.7324 C313.0771,94.7324 313.0771,85.4883 328.0771,85.4883 L338.0771,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="257.2021" x="341.0771" y="109.2676">Type 2 for business-critical attributes</text><path d="M288.0771,94.7324 L298.0771,94.7324 C313.0771,94.7324 313.0771,103.9766 328.0771,103.9766 L338.0771,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M103.4453,122.9766 L113.4453,122.9766 C128.4453,122.9766 128.4453,94.7324 143.4453,94.7324 L153.4453,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="129.3955" x="153.4453" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.3955" x="163.4453" y="156.5117">Design Principle</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.8262" x="335.8408" y="147.2676">Don't apply Type 2 to everything</text><path d="M282.8408,151.2207 L292.8408,151.2207 C307.8408,151.2207 307.8408,141.9766 322.8408,141.9766 L332.8408,141.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="279.0771" x="335.8408" y="165.7559">Overhead only justified for key attributes</text><path d="M282.8408,151.2207 L292.8408,151.2207 C307.8408,151.2207 307.8408,160.4648 322.8408,160.4648 L332.8408,160.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M103.4453,122.9766 L113.4453,122.9766 C128.4453,122.9766 128.4453,151.2207 143.4453,151.2207 L153.4453,151.2207" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="124.043" x="153.4453" y="189.4648"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.043" x="163.4453" y="213">Documentation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="269.7188" x="330.4883" y="203.7559">Clearly document per-column SCD type</text><path d="M277.4883,207.709 L287.4883,207.709 C302.4883,207.709 302.4883,198.4648 317.4883,198.4648 L327.4883,198.4648" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="205.9326" x="330.4883" y="222.2441">Guide downstream consumers</text><path d="M277.4883,207.709 L287.4883,207.709 C302.4883,207.709 302.4883,216.9531 317.4883,216.9531 L327.4883,216.9531" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M103.4453,122.9766 L113.4453,122.9766 C128.4453,122.9766 128.4453,207.709 143.4453,207.709 L153.4453,207.709" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><?plantuml-src VPFFRjD04CRlVegHE01HOnnJoXyLL4XaE810IgHUAg6rFRQ7h6UjtJ6jLVNQ1-0HUHBMTXA48Snjl_bcVhkVj1TEb9MQEAzL4vmxwJI-2Lxbs4ZrA7eCjm7uUgUoRMbDo_dIQ6FXGP8yIqxFXjv7OlnRJGpBJYs6EdWt5MLRHkVWQHW5TtlMuYWhYfw_M9rEMHFrpwsJ6oH3_MR5Hrb5aRwCeYbhelwN5GtbMQcvqRtdzgZZ_CakxXbyeXlCORrSNV5Qh18i2Lqmcy4bIKKCQrKZR5IgqOkphx2Yea2BB90PtTRiuEVz3yWFgjy4qZN33c_7i0nF06j56bx3nZTWSG8PIRS_nZtiGvTQok5jqrYZicgS7TrG-AkpuRbYfJkXJ6bG8fRILlQKST7WJ5j7VKBppD8_pB12HoN35qkSKNDubU670gffTBTV9WRmEzgkJw4SNP_zkKALWs7l-zOweO9yUZrtYzsKPBAszf4e8SFZWgL6PVrelcj1WtO-vdW8RdI-Rob7xxjc9nPLxTDcvsUi2oxGVvdTjmaMOHp5Ps7y2m00?></g></svg>