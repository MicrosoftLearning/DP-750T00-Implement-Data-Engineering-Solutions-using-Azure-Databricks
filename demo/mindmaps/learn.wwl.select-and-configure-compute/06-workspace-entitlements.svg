<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="304px" preserveAspectRatio="none" style="width:816px;height:304px;background:#FFFFFF;" version="1.1" viewBox="0 0 816 304" width="816px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="224.5996" x="10" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="204.5996" x="20" y="156.5117">Workspace-Level Entitlements</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="212.7529" x="284.5996" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="192.7529" x="294.5996" y="43.5352">Unrestricted cluster creation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="253.8047" x="550.3525" y="25.0469">Allows non-admins to create clusters</text><path d="M497.3525,38.2441 L507.3525,38.2441 C522.3525,38.2441 522.3525,19.7559 537.3525,19.7559 L547.3525,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.3662" x="550.3525" y="43.5352">No size restrictions</text><path d="M497.3525,38.2441 L507.3525,38.2441 C522.3525,38.2441 522.3525,38.2441 537.3525,38.2441 L547.3525,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.2236" x="550.3525" y="62.0234">Does NOT grant workspace admin</text><path d="M497.3525,38.2441 L507.3525,38.2441 C522.3525,38.2441 522.3525,56.7324 537.3525,56.7324 L547.3525,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M234.5996,151.2207 L244.5996,151.2207 C259.5996,151.2207 259.5996,38.2441 274.5996,38.2441 L284.5996,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="132.2188" x="284.5996" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.2188" x="294.5996" y="100.0234">Default behavior</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="272.2686" x="469.8184" y="100.0234">Only admins can create any-size cluster</text><path d="M416.8184,94.7324 L426.8184,94.7324 C441.8184,94.7324 441.8184,94.7324 456.8184,94.7324 L466.8184,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M234.5996,151.2207 L244.5996,151.2207 C259.5996,151.2207 259.5996,94.7324 274.5996,94.7324 L284.5996,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="139.7998" x="284.5996" y="132.9766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.7998" x="294.5996" y="156.5117">Grant via Settings</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.3184" x="477.3994" y="138.0234">Identity and access &gt; Users/Groups</text><path d="M424.3994,151.2207 L434.3994,151.2207 C449.3994,151.2207 449.3994,132.7324 464.3994,132.7324 L474.3994,132.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.6826" x="477.3994" y="156.5117">Entitlements section</text><path d="M424.3994,151.2207 L434.3994,151.2207 C449.3994,151.2207 449.3994,151.2207 464.3994,151.2207 L474.3994,151.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="20