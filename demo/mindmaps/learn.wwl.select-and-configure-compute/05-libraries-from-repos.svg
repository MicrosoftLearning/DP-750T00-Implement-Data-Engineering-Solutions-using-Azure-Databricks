<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="247px" preserveAspectRatio="none" style="width:838px;height:247px;background:#FFFFFF;" version="1.1" viewBox="0 0 838 247" width="838px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="203.6953" x="10" y="104.7324"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="183.6953" x="20" y="128.2676">Libraries from Repositories</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="106.625" x="263.6953" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="86.625" x="273.6953" y="43.5352">PyPI (Python)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.3477" x="423.3203" y="25.0469">Enter package name</text><path d="M370.3203,38.2441 L380.3203,38.2441 C395.3203,38.2441 395.3203,19.7559 410.3203,19.7559 L420.3203,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.8203" x="423.3203" y="43.5352">Pin exact version for production</text><path d="M370.3203,38.2441 L380.3203,38.2441 C395.3203,38.2441 395.3203,38.2441 410.3203,38.2441 L420.3203,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.8213" x="423.3203" y="62.0234">e.g. pymssql==2.3.9</text><path d="M370.3203,38.2441 L380.3203,38.2441 C395.3203,38.2441 395.3203,56.7324 410.3203,56.7324 L420.3203,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M213.6953,122.9766 L223.6953,122.9766 C238.6953,122.9766 238.6953,38.2441 253.6953,38.2441