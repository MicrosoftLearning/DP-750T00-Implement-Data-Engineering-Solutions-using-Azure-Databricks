<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="191px" preserveAspectRatio="none" style="width:1238px;height:191px;background:#FFFFFF;" version="1.1" viewBox="0 0 1238 191" width="1238px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="153.6973" x="434.3008" y="68.2441"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.6973" x="444.3008" y="91.7793">Combine Rows with</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.6543" x="444.3008" y="108.2676">Set Operators</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="65.2949" x="637.998" y="48.2441"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45.2949" x="647.998" y="71.7793">UNION</text><rect fill="#FFB900" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FFB900;stroke-width:3;" width="226.8623" x="753.293" y="20"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.8623" x="763.293" y="43.5352">Removes duplicates by default</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="193.0127" x="1033.1553" y="43.5352">Stack rows from two queries</text><path d="M980.1553,38.2441 L990.1553,38.2441 C1005.1553,38.2441 1005.1553,38.2441 1020.1553,38.2441 L1030.1553,38.2441" fill="none" style="stroke:#FFB900;stroke-width:3;"/><path d="M703.293,66.4883 L713.293,66.4883 C728.293,66.4883 728.293,38.2441 743.293,38.2441 L753.293,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><rect fill="#FFB900" height="36.4883" rx="12.5" ry="12.5" style="stroke:#FFB900;stroke-width:3;" width="94.3135" x="753.293" y="76.4883"