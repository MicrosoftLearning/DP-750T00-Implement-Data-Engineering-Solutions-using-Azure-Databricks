 380.8984,56.7324 L390.8984,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M148.3301,103.209 L158.3301,103.209 C173.3301,103.209 173.3301,38.2441 188.3301,38.2441 L198.3301,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="136.4229" x="198.3301" y="85.2207"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.4229" x="208.3301" y="108.7559">External volumes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="205.7344" x="387.7529" y="81.0234">Specify storage path on create</text><path d="M334.7529,103.4648 L344.7529,103.4648 C359.7529,103.4648 359.7529,75.7324 374.7529,75.7324 L384.7529,75.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="220.0762" x="387.7529" y="99.5117">Drop = remove registration only</text><path d="M334.7529,103.4648 L344.7529,103.4648 C359.7529,103.4648 359.7529,94.2207 374.7529,94.2207 L384.7529,94.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.335" x="387.7529" y="118">Files remain in cloud storage</text><path d="M334.7529,103.4648 L344.7529,103.4648 C359.7529,103.4648 359.7529,112.709 374.7529,112.709 L384.7529,112.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="387.7529" y="136.4883">Best for multi-system data sharing</text><path d="M334.7529,103.4648 L344.7529,103.4648 C359.7529,103.4648 359.7529,131.1973 374.7529,131.1973 L384.7529,131.1973" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M148.3301,103.209 L158.3301,103.209 C173.3301,103.209 173.3301,103.4648 188.3301