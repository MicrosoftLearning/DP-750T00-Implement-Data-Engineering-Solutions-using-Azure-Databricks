<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="134px" preserveAspectRatio="none" style="width:1288px;height:134px;background:#FFFFFF;" version="1.1" viewBox="0 0 1288 134" width="1288px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="155.7344" x="598.5684" y="40"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.6211" x="608.5684" y="63.5352">Configure Flows</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.7344" x="608.5684" y="80.0234">for Multiple Sources</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="112.0391" x="804.3027" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.0391" x="814.3027" y="43.5352">Explicit Flows</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="307.002" x="969.3418" y="25.0469">CREATE FLOW ... AS INSERT INTO ... BY NAME</text><path d="M916.3418,38.2441 L926.3418,38.2441 C941.3418,38.2441 941.3418,19.7559 956.3418,19.7559 L966.3418,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="241.1377" x="969.3418" y="43.5352">Multiple flows &#8594; single target table</text><path d="M916.3418,38.2441 L926.3418,38.2441 C941.3418,38.2441 941.3418,38.2441 956.3418,38.2441 L966.3418,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.5117" x="969.3418" y="62.0234">No UNION required</text><path d="M916.3418,38.2441 L926.3418,38.2441 C941.3418,38.2441 941.3418,56.7324 956.3418,56.7324 L966.3418,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M754.3027,66.4883 L764.3027,66.4883 C779.3027,66.4883 779.3027,38.2441 794.3027,38.2441 L804.3027,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="108.7715" x="804.3027" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="88.7715" x="814.3027" y="100.0234">Python Flows</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.0869" x="966.0742" y="81.5352">@dp.append_flow(target="table")</text><path d="M913.0742,94.7324 L923.0742,94.7324 C938.0742,94.7324 938.0742,76.2441 953.0742,76.2441 L963.0742,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.3691" x="966.0742" y="100.0234">Multiple decorators per target</text><path d="M913.0742,94.7324 L923.0742,94.7324 C938.0742,94.7324 938.0742,94.7324 953.0742,94.7324 L963.0742,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224.2051" x="966.0742" y="118.5117">Each source an independent flow</text><path d="M913.0742,94.7324 L923.0742,94.7324 C938.0742,94.7324 938.0742,113.2207 953.0742,113.2207 L963.0742,113.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M754.3027,66.4883 L764.3027,66.4883 C779.3027,66.4883 779.3027,94.7324 794.3027,94.7324 L804.3027,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="142.4453" x="406.123" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.4453" x="416.123" y="43.5352">Benefits vs UNION</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="343.123" x="10" y="25.0469">Add new sources without modifying existing flows</text><path d="M406.123,38.2441 L396.123,38.2441 C381.123,38.2441 381.123,19.7559 366.123,19.7559 L356.123,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="246.8936" x="106.2295" y="43.5352">No full refresh triggered on changes</text><path d="M406.123,38.2441 L396.123,38.2441 C381.123,38.2441 381.123,38.2441 366.123,38.2441 L356.123,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.6221" x="142.501" y="62.0234">More flexible and maintainable</text><path d="M406.123,38.2441 L396.123,38.2441 C381.123,38.2441 381.123,56.7324 366.123,56.7324 L356.123,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M598.5684,66.4883 L588.5684,66.4883 C573.5684,66.4883 573.5684,38.2441 558.5684,38.2441 L548.5684,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="123.5439" x="425.0244" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="103.5439" x="435.0244" y="100.0234">Important Note</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.2793" x="150.7451" y="81.5352">Flow names identify checkpoints</text><path d="M425.0244,94.7324 L415.0244,94.7324 C400.0244,94.7324 400.0244,76.2441 385.0244,76.2441 L375.0244,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="257.7217" x="114.3027" y="100.0234">Renaming a flow resets its checkpoint</text><p