<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="134px" preserveAspectRatio="none" style="width:1270px;height:134px;background:#FFFFFF;" version="1.1" viewBox="0 0 1270 134" width="1270px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="142.6846" x="501.1768" y="40"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.6221" x="511.1768" y="63.5352">Understand CDC</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.6846" x="511.1768" y="80.0234">Ingestion Patterns</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="109.4414" x="693.8613" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="89.4414" x="703.8613" y="43.5352">What is CDC?</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="345.9258" x="856.3027" y="25.0469">Capture only changes: INSERTs, UPDATEs, DELETEs</text><path d="M803.3027,38.2441 L813.3027,38.2441 C828.3027,38.2441 828.3027,19.7559 843.3027,19.7559 L853.3027,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.6416" x="856.3027" y="43.5352">No full table reloads</text><path d="M803.3027,38.2441 L813.3027,38.2441 C828.3027,38.2441 828.3027,38.2441 843.3027,38.2441 L853.3027,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.2725" x="856.3027" y="62.0234">Incremental processing</text><path d="M803.3027,38.2441 L813.3027,38.2441 C828.3027,38.2441 828.3027,56.7324 843.3027,56.7324 L853.3027,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M643.8613,66.4883 L653.8613,66.4883 C668.8613,66.4883 668.8613,38.2441 683.8613,38.2441 L693.8613,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="167.499" x="693.8613" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.499" x="703.8613" y="100.0234">CDC Record Structure</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="178.8076" x="914.3604" y="81.5352">Data columns: field values</text><path d="M861.3604,94.7324 L871.3604,94.7324 C886.3604,94.7324 886.3604,76.2441 901.3604,76.2441 L911.3604,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="293.1729" x="914.3604" y="100.0234">Operation type: INSERT / UPDATE / DELETE</text><path d="M861.3604,94.7324 L871.3604,94.7324 C886.3604,94.7324 886.3604,94.7324 901.3604,94.7324 L911.3604,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="344.292" x="914.3604" y="118.5117">Sequence column: timestamp or sequence number</text><path d="M861.3604,94.7324 L871.3604,94.7324 C886.3604,94.7324 886.3604,113.2207 901.3604,113.2207 L911.3604,113.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M643.8613,66.4883 L653.8613,66.4883 C668.8613,66.4883 668.8613,94.7324 683.8613,94.7324 L693.8613,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="73.9082" x="377.2686" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="53.9082" x="387.2686" y="43.5352">Benefits</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.6387" x="83.6299" y="25.0469">Reduced latency (minutes vs hours)</text><path d="M377.2686,38.2441 L367.2686,38.2441 C352.2686,38.2441 352.2686,19.7559 337.2686,19.7559 L327.2686,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.4795" x="110.7891" y="43.5352">Lower compute &amp; storage costs</text><path d="M377.2686,38.2441 L367.2686,38.2441 C352.2686,38.2441 352.2686,38.2441 337.2686,38.2441 L327.2686,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.8779" x="83.3906" y="62.0234">Minimal impact on source database</text><path d="M377.2686,38.2441 L367.2686,38.2441 C352.2686,38.2441 352.2686,56.7324 337.2686,56.7324 L327.2686,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M501.1768,66.4883 L491.1768,66.4883 C476.1768,66.4883 476.1768,38.2441 461.1768,38.2441 L451.1768,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="117.8018" x="333.375" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.8018" x="343.375" y="100.0234">vs. Full Reload</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="220.917" x="59.458" y="81.5352">Full reload: re-reads entire table</text><path d="M333.375,94.7324 L323.375,94.7324 C308.375,94.7324 308.375,76.2441 293.375,76.2441 L283.375,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="238.041" x="42.334" y="100.0234">CDC: processes only what changed</text><path d