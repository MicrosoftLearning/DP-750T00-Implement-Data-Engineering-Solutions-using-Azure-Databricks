<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="191px" preserveAspectRatio="none" style="width:1221px;height:191px;background:#FFFFFF;" version="1.1" viewBox="0 0 1221 191" width="1221px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="147.791" x="551.8379" y="68.2441"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.791" x="561.8379" y="91.7793">Control Processing</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="89.9404" x="561.8379" y="108.2676">with Triggers</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="150.3887" x="749.6289" y="48.2441"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.3887" x="759.6289" y="71.7793">Default (no trigger)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.416" x="953.0176" y="53.291">Next batch starts when previous ends</text><path d="M900.0176,66.4883 L910.0176,66.4883 C925.0176,66.4883 925.0176,48 940.0176,48 L950.0176,48" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3379" x="953.0176" y="71.7793">Continuous processing</text><path d="M900.0176,66.4883 L910.0176,66.4883 C925.0176,66.4883 925.0176,66.4883 940.0176,66.4883 L950.0176,66.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.4697" x="953.0176" y="90.2676">Runs indefinitely</text><path d="M900.0176,66.4883 L910.0176,66.4883 C925.0176,66.4883 925.0176,84.9766 940.0176,84.9766 L950.0176,84.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M699.6289,94.7324 L709.6289,94.7324 C724.6289,94.7324 724.6289,66.4883 739.6289,66.4883 L749.6289,66.4883" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="127.6182" x="749.6289" y="104.7324"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.6182" x="759.6289" y="128.2676">processingTime</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.4893" x="930.2471" y="119.0234">Fixed micro-batch interval</text><path d="M877.2471,122.9766 L887.2471,122.9766 C902.2471,122.9766 902.2471,113.7324 917.2471,113.7324 L927.2471,113.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.7559" x="930.2471" y="137.5117">e.g. "10 seconds"</text><path d="M877.2471,122.9766 L887.2471,122.9766 C902.2471,122.9766 902.2471,132.2207 917.2471,132.2207 L927.2471,132.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M699.6289,94.7324 L709.6289,94.7324 C724.6289,94.7324 724.6289,122.9766 739.6289,122.9766 L749.6289,122.9766" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="151.1201" x="350.7178" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.1201" x="360.7178" y="43.5352">availableNow=True</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="211.2441" x="86.4736" y="25.0469">Processes all unprocessed data</text><path d="M350.7178,38.2441 L340.7178,38.2441 C325.7178,38.2441 325.7178,19.7559 310.7178,19.7559 L300.7178,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.0889" x="108.6289" y="43.5352">Terminates when caught up</text><path d="M350.7178,38.2441 L340.7178,38.2441 C325.7178,38.2441 325.7178,38.2441 310.7178,38.2441 L300.7178,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="287.7178" x="10" y="62.0234">Good for scheduled batch-style streaming</text><path d="M350.7178,38.2441 L340.7178,38.2441 C325.7178,38.2441 325.7178,56.7324 310.7178,56.7324 L300.7178,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M551.8379,94.7324 L541.8379,94.7324 C526.8379,94.7324 526.8379,38.2441 511.8379,38.2441 L501.8379,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="183.6934" x="318.1445" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="163.6934" x="328.1445" y="100.0234">once=True (deprecated)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.7725" x="68.3721" y="90.7793">One micro-batch, then stops</text><path d="M318.1445,94.7324 L308.1445,94.7324 C293.1445,94.7324 293.1445,85.4883 278.1445,85.4883 L268.1445,85.4883" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.8691" x="93.2754" y="109.2676">Use availableNow instead</text><path d="M318.1445,94.7324 L308.1445,94.7324 C293.1445,94.7324 293.1445,103.9766 278.1445,103.9766 L268.1445,103.9766" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M551.8379,94.7324 L541.8379,94.7324 C526.8379,94.7324 526.8379,94.7324 511.8379,94.7324 L501.8379,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="1