<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="134px" preserveAspectRatio="none" style="width:1221px;height:134px;background:#FFFFFF;" version="1.1" viewBox="0 0 1221 134" width="1221px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="166.0156" x="523.9541" y="40"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.1152" x="533.9541" y="63.5352">Configure</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.0156" x="533.9541" y="80.0234">Checkpoint Locations</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="168.6543" x="739.9697" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="148.6543" x="749.9697" y="43.5352">What is a Checkpoint?</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="192.3223" x="961.624" y="25.0469">Stores offset / progress info</text><path d="M908.624,38.2441 L918.624,38.2441 C933.624,38.2441 933.624,19.7559 948.624,19.7559 L958.624,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.3496" x="961.624" y="43.5352">Enables restart without reprocessing</text><path d="M908.624,38.2441 L918.624,38.2441 C933.624,38.2441 933.624,38.2441 948.624,38.2441 L958.624,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="241.7803" x="961.624" y="62.0234">Guarantees exactly-once semantics</text><path d="M908.624,38.2441 L918.624,38.2441 C933.624,38.2441 933.624,56.7324 948.624,56.7324 L958.624,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M689.9697,66.4883 L699.9697,66.4883 C714.9697,66.4883 714.9697,38.2441 729.9697,38.2441 L739.9697,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="113.6592" x="739.9697" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.6592" x="749.9697" y="100.0234">Requirements</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="283.4932" x="906.6289" y="81.5352">Each query needs unique checkpoint path</text><path d="M853.6289,94.7324 L863.6289,94.7324 C878.6289,94.7324 878.6289,76.2441 893.6289,76.2441 L903.6289,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.3604" x="906.6289" y="100.0234">Sharing checkpoints causes errors</text><path d="M853.6289,94.7324 L863.6289,94.7324 C878.6289,94.7324 878.6289,94.7324 893.6289,94.7324 L903.6289,94.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="215.3525" x="906.6289" y="118.5117">Store in durable location (ADLS)</text><path d="M853.6289,94.7324 L863.6289,94.7324 C878.6289,94.7324 878.6289,113.2207 893.6289,113.2207 L903.6289,113.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M689.9697,66.4883 L699.9697,66.4883 C714.9697,66.4883 714.9697,94.7324 729.9697,94.7324 L739.9697,94.7324" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="112.415" x="361.5391" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.415" x="371.5391" y="43.5352">Best Practices</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="195.9863" x="112.5527" y="25.0469">Use Azure Data Lake Storage</text><path d="M361.5391,38.2441 L351.5391,38.2441 C336.5391,38.2441 336.5391,19.7559 321.5391,19.7559 L311.5391,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.2793" x="45.2598" y="43.5352">Avoid lifecycle policies that delete files</text><path d="M361.5391,38.2441 L351.5391,38.2441 C336.5391,38.2441 336.5391,38.2441 321.5391,38.2441 L311.5391,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.2471" x="102.292" y="62.0234">Keep small but treat as critical</text><path d="M361.5391,38.2441 L351.5391,38.2441 C336.5391,38.2441 336.5391,56.7324 321.5391,56.7324 L311.5391,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M523.9541,66.4883 L513.9541,66.4883 C498.9541,66.4883 498.9541,38.2441 483.9541,38.2441 L473.9541,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="113.6182" x="360.3359" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.6182" x="370.3359" y="100.0234">Configuration</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="282.6455" x="24.6904" y="81.5352">checkpointLocation option in writeStream</text><path d="M360.3359,94.7324 L350.3359,94.7324 C335.3359,94.7324 335.3359,76.2441 320.3359,76.2441 L310.3359,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="269.3906" x="37.9453" y="100.0234">Set before starting any streaming query</tex