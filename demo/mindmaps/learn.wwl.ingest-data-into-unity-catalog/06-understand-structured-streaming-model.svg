0664" y="43.5352">Checkpoints</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.4961" x="110.5703" y="25.0469">Track processed records</text><path d="M330.0664,38.2441 L320.0664,38.2441 C305.0664,38.2441 305.0664,19.7559 290.0664,19.7559 L280.0664,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.1416" x="86.9248" y="43.5352">Enable fault-tolerant restart</text><path d="M330.0664,38.2441 L320.0664,38.2441 C305.0664,38.2441 305.0664,38.2441 290.0664,38.2441 L280.0664,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="267.0664" x="10" y="62.0234">Resume from last checkpoint on failure</text><path d="M330.0664,38.2441 L320.0664,38.2441 C305.0664,38.2441 305.0664,56.7324 290.0664,56.7324 L280.0664,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M484.1143,66.4883 L474.1143,66.4883 C459.1143,66.4883 459.1143,38.2441 444.1143,38.2441 L434.1143,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="88.5576" x="345.5566" y="76.4883"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.5576" x="355.5566" y="100.0234">Use Cases</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.1074" x="158.4492" y="81.5352">IoT sensor readings</text><path d="M345.5566,94.7324 L335.5566,94.7324 C320.5566,94.7324 320.5566,76.2441 305.5566,76.2441 L295.5566,76.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7773" x="178.7793" y="100.0234">Clickstream data</text><path d="M345.5566,94.7324 L3