<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="134px" preserveAspectRatio="none" style="width:1296px;height:134px;background:#FFFFFF;" version="1.1" viewBox="0 0 1296 134" width="1296px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="209.376" x="484.1143" y="40"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.4873" x="494.1143" y="63.5352">Understand the</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.376" x="494.1143" y="80.0234">Structured Streaming Model</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="200.6943" x="743.4902" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.6943" x="753.4902" y="43.5352">Unbounded Table Concept</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="287.0068" x="997.1846" y="25.0469">Data stream = continuously growing table</text><path d="M944.1846,38.2441 L954.1846,38.2441 C969.1846,38.2441 969.1846,19.7559 984.1846,19.7559 L994.1846,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.8193" x="997.1846" y="43.5352">Same DataFrame API as batch</text><path d="M944.1846,38.2441 L954.1846,38.2441 C969.1846,38.2441 969.1846,38.2441 984.1846,38.2441 L994.1846,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="267.7773" x="997.1846" y="62.0234">spark.readStream instead of spark.read</text><path d="M944.1846,38.2441 L954.1846,38.2441 C969.1846,38.244