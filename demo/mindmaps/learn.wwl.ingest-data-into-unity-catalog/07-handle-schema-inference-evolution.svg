<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="MINDMAP" height="151px" preserveAspectRatio="none" style="width:1371px;height:151px;background:#FFFFFF;" version="1.1" viewBox="0 0 1371 151" width="1371px" zoomAndPan="magnify"><defs/><g><rect fill="#FF5F46" height="52.9766" rx="12.5" ry="12.5" style="stroke:#FF5F46;stroke-width:3;" width="191.083" x="567.0273" y="48.4766"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.083" x="577.0273" y="72.0117">Handle Schema Inference</text><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.4014" x="577.0273" y="88.5">and Evolution</text><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="139.2871" x="808.1104" y="20"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.2871" x="818.1104" y="43.5352">Schema Inference</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="326.3887" x="1000.3975" y="25.0469">cloudFiles.inferColumnTypes: auto-detect types</text><path d="M947.3975,38.2441 L957.3975,38.2441 C972.3975,38.2441 972.3975,19.7559 987.3975,19.7559 L997.3975,19.7559" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.2969" x="1000.3975" y="43.5352">Default: all columns as string (safe)</text><path d="M947.3975,38.2441 L957.3975,38.2441 C972.3975,38.2441 972.3975,38.2441 987.3975,38.2441 L997.3975,38.2441" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.1494" x="1000.3975" y="62.0234">Samples files to determine types</text><path d="M947.3975,38.2441 L957.3975,38.2441 C972.3975,38.2441 972.3975,56.7324 987.3975,56.7324 L997.3975,56.7324" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M758.1104,74.9648 L768.1104,74.9648 C783.1104,74.9648 783.1104,38.2441 798.1104,38.2441 L808.1104,38.2441" fill="none" style="stroke:#FF5F46;stroke-width:3;"/><rect fill="#0078D4" height="36.4883" rx="12.5" ry="12.5" style="stroke:#0078D4;stroke-width:3;" width="188.0068" x="808.1104" y="84.709"/><text fill="#FFFFFF" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.0068" x="818.1104" y="108.2441">Schema Evolution Modes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.0879" x="1049.1172" y="80.5117">addNewColumns: fail, add cols, restart</text><path d="M996.1172,102.9531 L1006.1172,102.9531 C1021.1172,102.9531 1021.1172,75.2207 1036.1172,75.2207 L1046.1172,75.2207" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="285.6807" x="1049.1172" y="99">rescue: capture new cols in _rescued_data</text><path d="M996.1172,102.9531 L1006.1172,102.9531 C1021.1172,102.9531 1021.1172,93.709 1036.1172,93.709 L1046.1172,93.709" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="310.7002" x="1049.1172" y="117.4883">failOnNewColumns: fail until schema updated</text><path d="M996.1172,102.9531 L1006.1172,102.9531 C1021.1172,102.9531 1021.1172,112.1973 1036.1172,112.1973 L1046.1172,112.1973" fill="none" style="stroke:#0078D4;stroke-width:3;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="179.7646" x="1049.1172" y="135.9766">none: ignore new columns</text><path d="M996.1172,102.9531 L1006.1172,102.9531 C1021.1172,102.9531 1021.1172,130.6855 1036.1172,130.6855 L1046.1172,130.6855" fill="none" style="stroke:#0078D4;stroke-width:3;"/><path d="M758.11